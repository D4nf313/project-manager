# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/project_manager?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1395
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - create recrea las tablas limpias al arrancar
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Fuerza VARCHAR para UUIDs en lugar de BINARY(16)
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR

# Ejecuta data.sql despues de que JPA cree las tablas
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# App
spring.application.name=project-manager
server.port=8080

# JWT
jwt.secret=mi-clave-secreta-super-segura-de-32-caracteres-minimo
jwt.expiration=86400000

logging.level.org.springframework.security=DEBUG

# SWAGGER
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs